name: Build (musl static)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag name for artifact naming, for example v0.1.4'
        required: false
        type: string

jobs:
  build-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build static musl binaries
        env:
          CARGO_TERM_COLOR: always
        run: |
          cargo build --locked --release --bin rnps --target x86_64-unknown-linux-musl
          cargo build --locked --release --bin rnpc --target x86_64-unknown-linux-musl

      - name: Verify binaries are static
        run: |
          file target/x86_64-unknown-linux-musl/release/rnps
          file target/x86_64-unknown-linux-musl/release/rnpc
          ldd target/x86_64-unknown-linux-musl/release/rnps || true
          ldd target/x86_64-unknown-linux-musl/release/rnpc || true

      - name: Package artifacts
        run: |
          set -e
          mkdir -p dist
          TAG=${GITHUB_REF_NAME}
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          fi
          RNPS_NAME=rnps-${TAG}-linux-x86_64
          RNPC_NAME=rnpc-${TAG}-linux-x86_64
          cp target/x86_64-unknown-linux-musl/release/rnps dist/${RNPS_NAME}
          cp target/x86_64-unknown-linux-musl/release/rnpc dist/${RNPC_NAME}
          tar -C dist -czf dist/${RNPS_NAME}.tar.gz ${RNPS_NAME}
          tar -C dist -czf dist/${RNPC_NAME}.tar.gz ${RNPC_NAME}
          sha256sum dist/${RNPS_NAME}.tar.gz > dist/${RNPS_NAME}.tar.gz.sha256
          sha256sum dist/${RNPC_NAME}.tar.gz > dist/${RNPC_NAME}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rnps-musl-artifacts
          path: |
            dist/*.tar.gz
            dist/*.sha256
