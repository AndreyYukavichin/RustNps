name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: read

env:
  IMAGE_NAME: andreiyhub/rustnps

jobs:
  publish:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute docker tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_NAME}"
          TAGS="${IMAGE}:latest"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ inputs.tag }}"
            CLEAN_TAG="${RAW_TAG#v}"
            TAGS=$(printf '%s\n%s:%s' "${TAGS}" "${IMAGE}" "${CLEAN_TAG}")
          else
            RAW_TAG="${GITHUB_REF_NAME#v}"
            TAGS=$(printf '%s\n%s:%s' "${TAGS}" "${IMAGE}" "${RAW_TAG}")

            IFS='.' read -r major minor patch <<< "${RAW_TAG}"
            if [ -n "${major:-}" ]; then
              TAGS=$(printf '%s\n%s:%s' "${TAGS}" "${IMAGE}" "${major}")
            fi
            if [ -n "${major:-}" ] && [ -n "${minor:-}" ]; then
              TAGS=$(printf '%s\n%s:%s' "${TAGS}" "${IMAGE}" "${major}.${minor}")
            fi
          fi

          {
            echo 'tags<<EOF'
            echo "${TAGS}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=RustNps
            org.opencontainers.image.description=Rust reconstruction of nps/npc

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
            linux/386
            linux/arm64
            linux/arm/v7
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max