name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            apt_package: ""
          - target: aarch64-unknown-linux-gnu
            apt_package: gcc-aarch64-linux-gnu
          - target: armv7-unknown-linux-gnueabihf
            apt_package: gcc-arm-linux-gnueabihf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker
        if: matrix.apt_package != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_package }}

      - name: Build binaries
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package server and client
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          SERVER_DIR="dist/RustNps-${TAG}-nps-${{ matrix.target }}"
          CLIENT_DIR="dist/RustNps-${TAG}-npc-${{ matrix.target }}"
          mkdir -p "$SERVER_DIR/conf" "$CLIENT_DIR/conf"
          cp "target/${{ matrix.target }}/release/nps" "$SERVER_DIR/"
          cp "target/${{ matrix.target }}/release/npc" "$CLIENT_DIR/"
          cp conf/nps.conf "$SERVER_DIR/conf/"
          cp conf/npc.conf "$CLIENT_DIR/conf/"
          cp -r web "$SERVER_DIR/"
          tar -C dist -czf "dist/RustNps-${TAG}-nps-${{ matrix.target }}.tar.gz" "RustNps-${TAG}-nps-${{ matrix.target }}"
          tar -C dist -czf "dist/RustNps-${TAG}-npc-${{ matrix.target }}.tar.gz" "RustNps-${TAG}-npc-${{ matrix.target }}"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: |
            dist/RustNps-*-nps-${{ matrix.target }}.tar.gz
            dist/RustNps-*-npc-${{ matrix.target }}.tar.gz

  build-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package server and client
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
          }
          $serverDir = "dist/RustNps-$tag-nps-${{ matrix.target }}"
          $clientDir = "dist/RustNps-$tag-npc-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "$serverDir/conf" | Out-Null
          New-Item -ItemType Directory -Force -Path "$clientDir/conf" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/nps.exe" $serverDir
          Copy-Item "target/${{ matrix.target }}/release/npc.exe" $clientDir
          Copy-Item "conf/nps.conf" "$serverDir/conf/"
          Copy-Item "conf/npc.conf" "$clientDir/conf/"
          Copy-Item "web" $serverDir -Recurse
          Compress-Archive -Path $serverDir -DestinationPath "dist/RustNps-$tag-nps-${{ matrix.target }}.zip" -Force
          Compress-Archive -Path $clientDir -DestinationPath "dist/RustNps-$tag-npc-${{ matrix.target }}.zip" -Force

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: |
            dist/RustNps-*-nps-${{ matrix.target }}.zip
            dist/RustNps-*-npc-${{ matrix.target }}.zip

  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package server and client
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          SERVER_DIR="dist/RustNps-${TAG}-nps-${{ matrix.target }}"
          CLIENT_DIR="dist/RustNps-${TAG}-npc-${{ matrix.target }}"
          mkdir -p "$SERVER_DIR/conf" "$CLIENT_DIR/conf"
          cp "target/${{ matrix.target }}/release/nps" "$SERVER_DIR/"
          cp "target/${{ matrix.target }}/release/npc" "$CLIENT_DIR/"
          cp conf/nps.conf "$SERVER_DIR/conf/"
          cp conf/npc.conf "$CLIENT_DIR/conf/"
          cp -r web "$SERVER_DIR/"
          tar -C dist -czf "dist/RustNps-${TAG}-nps-${{ matrix.target }}.tar.gz" "RustNps-${TAG}-nps-${{ matrix.target }}"
          tar -C dist -czf "dist/RustNps-${TAG}-npc-${{ matrix.target }}.tar.gz" "RustNps-${TAG}-npc-${{ matrix.target }}"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            dist/RustNps-*-nps-${{ matrix.target }}.tar.gz
            dist/RustNps-*-npc-${{ matrix.target }}.tar.gz

  release:
    name: Publish GitHub Release
    needs:
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Resolve tag and release notes
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          BODY_FILE="release-body.md"
          NOTES_FILE="RELEASE_NOTES_${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" "$BODY_FILE"
          else
            printf '# RustNps %s\n\nSee the bundled artifacts for this release.\n' "$TAG" > "$BODY_FILE"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body_path: ${{ steps.vars.outputs.body_file }}
          files: release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}