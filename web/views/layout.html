<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>RustNps - {{title}}</title>
    <link href="{{base}}/static/css/toastr.min.css" rel="stylesheet">
    <link href="{{base}}/static/css/fontawesome.min.css" rel="stylesheet">
    <link href="{{base}}/static/css/solid.min.css" rel="stylesheet">
    <link href="{{base}}/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{base}}/static/css/bootstrap-table.min.css" rel="stylesheet">
    <link href="{{base}}/static/css/style.css" rel="stylesheet">
    <script src="{{base}}/static/js/jquery-3.4.1.min.js"></script>
    <script src="{{base}}/static/js/clipboard.min.js"></script>
    <script src="{{base}}/static/js/toastr.min.js"></script>
    <script src="{{base}}/static/js/popper.min.js"></script>
    <script src="{{base}}/static/js/bootstrap.min.js"></script>
    <script src="{{base}}/static/js/bootstrap-table.min.js"></script>
    <script src="{{base}}/static/js/bootstrap-table-locale-all.min.js"></script>
    <script src="{{base}}/static/js/echarts.min.js"></script>

</head>
<body class="pace-done fixed-nav fixed-nav-basic">
<script>window.nps = {"web_base_url":"{{base}}"};</script>
<div id="wrapper">
    <nav class="navbar-default navbar-static-side" role="navigation">
        <div class="sidebar-collapse">
            <ul class="nav metismenu" id="side-menu">
                <li class="nav-header">
                    <div class="dropdown profile-element">
                        <span><i class="fa fa-user-cog fa-3x"></i></span>
                        <span class="clear"><span class="block m-t-xs"><strong class="font-bold">{{username}}</strong></span>
                        <span class="text-muted text-xs block" langtag="word-system"></span></span>
                    </div>
                    <div class="logo-element" langtag="application"></div>
                </li>
                {{nav}}
            </ul>
        </div>
    </nav>
    <div id="page-wrapper" class="gray-bg">
        <div class="row border-bottom">
            <nav class="navbar white-bg navbar-fixed-top" role="navigation" style="margin-bottom: 0">
                <div class="navbar-header">
                    <a class="navbar-minimalize minimalize-styl-2 btn btn-primary" href="#"><i class="fa fa-bars"></i></a>
                </div>
                <ul class="nav navbar-top-links navbar-right">
                    <li><span class="m-r-sm text-muted welcome-message"><span langtag="word-welcome"></span> <a href="https://github.com/yisier/nps" langtag="application"></a></span></li>
                    <li><span class="btn-group dropdown"><button id="languagemenu" class="btn btn-primary dropdown-toggle" type="button" data-toggle="dropdown"><i class="fa fa-globe-asia fa-lg"></i><span></span></button><ul class="dropdown-menu"></ul></span></li>
                    <li><a href="{{base}}/login/out"><i class="fa fa-sign-in-alt"></i><span langtag="word-logout"></span></a></li>
                </ul>
            </nav>
        </div>
        {{body}}
        <div class="footer fixed">
            <div class="float-right"><img src="{{base}}/static/img/RustNps.png" alt="RustNps" style="height:24px; vertical-align:initial;" /></div>
            <div><strong langtag="word-copyright"></strong> <span langtag="application"></span> &copy; 2018-2020</div>
        </div>
    </div>
</div>
</body>
</html>
